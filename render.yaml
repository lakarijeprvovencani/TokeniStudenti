# Render Blueprint – jedan klik deploy
# https://dashboard.render.com/blueprints
services:
  - type: web
    name: vajb-agent
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    # Trajni disk: balance i usage prežive restart (inače se gube na free tieru)
    disk:
      name: vajb-data
      mountPath: /data
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /data
      # Dodaj u Render Dashboard → Environment (Secret):
      # ANTHROPIC_API_KEY
      # STUDENT_API_KEYS
      # ADMIN_SECRET
