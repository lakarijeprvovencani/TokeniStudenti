<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Galerija — Agent test</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Jednostavan grid za galeriju */
    .gallery-container{ margin: 1rem 0 }
    .gallery-grid{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
      align-items: stretch;
    }
    .gallery-item{
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
      transition: transform 200ms ease, box-shadow 200ms ease;
      cursor: pointer;
      display: block;
    }
    .gallery-item img{
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 300ms ease;
    }
    .gallery-item:hover{
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 8px 20px rgba(16,24,40,0.12);
    }
    .gallery-item:hover img{ transform: scale(1.06) }
    .gallery-caption{ font-size: 0.9rem; color: var(--muted); padding: 0.4rem 0 }

    @media (max-width: 480px){
      .gallery-grid{ gap: 0.5rem }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>Galerija — Agent test</h1>
    <nav class="main-nav">
      <a href="index.html">Početna</a>
      <a href="about.html">O nama</a>
      <a href="statistika.html">Statistika</a>
      <a href="galerija.html">Galerija</a>
    </nav>
  </header>

  <main class="container gallery-container">
    <p class="gallery-caption">Primer galerije slika (placeholder sa placehold.co). Hover za veći prikaz.</p>

    <div class="gallery-grid">
      <a class="gallery-item" href="#" aria-label="Slika 1">
        <img src="https://placehold.co/600x400?text=Slika+1" alt="Slika 1">
      </a>
      <a class="gallery-item" href="#" aria-label="Slika 2">
        <img src="https://placehold.co/600x400?text=Slika+2" alt="Slika 2">
      </a>
      <a class="gallery-item" href="#" aria-label="Slika 3">
