<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kontakt</title>
  <!-- Tailwind CDN za brzi prototip -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <main class="max-w-3xl mx-auto p-6">
    <header class="mb-6">
      <h1 class="text-2xl font-semibold">Kontakt</h1>
      <p class="mt-1 text-gray-600 text-sm">Pošaljite nam poruku — odgovorimo u najkraćem roku.</p>
    </header>

    <form action="#" method="post" class="bg-white rounded-lg shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Ime
          <input type="text" name="ime" required placeholder="Vaše ime" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </label>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Email
          <input type="email" name="email" required placeholder="email@domen.rs" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </label>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Poruka
          <textarea name="poruka" rows="5" required placeholder="Vaša poruka" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </label>
      </div>

      <div>
        <button type="submit" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Pošalji</button>
      </div>
    </form>

    <p class="text-sm text-gray-500 mt-3">Napomena: Ne delimo vaše podatke sa trećim stranama. Ovo je test formular — bez stvarnog slanja dok se ne doda server-side obrada.</p>
  </main>
</body>
</html>
