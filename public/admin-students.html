<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VajbAgent – Upravljanje studentima</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      padding: 32px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 {
      font-size: 1.8rem; font-weight: 800; margin-bottom: 6px;
      background: linear-gradient(135deg, #fff 40%, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: rgba(255,255,255,0.4); margin-bottom: 28px; font-size: 0.9rem; }
    .nav { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .nav a {
      color: #a78bfa; text-decoration: none; font-size: 0.85rem;
      padding: 6px 14px; border: 1px solid rgba(167,139,250,0.3);
      border-radius: 8px; transition: all 0.2s;
    }
    .nav a:hover { background: rgba(167,139,250,0.15); }

    .card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 24px; margin-bottom: 20px;
    }
    .card h2 { font-size: 1.05rem; margin-bottom: 16px; color: #a78bfa; }

    .login-form { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .login-form input {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; width: 280px;
    }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-danger { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.35); }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; }
    .btn-success { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .btn-warn { background: rgba(234,179,8,0.2); color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); }

    .add-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .add-form input {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem;
    }
    .add-form input[name="name"] { width: 220px; }
    .add-form input[name="balance"] { width: 100px; }

    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 12px; text-align: left; font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    th { color: rgba(255,255,255,0.4); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .key-cell {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; color: #c4b5fd;
      cursor: pointer; position: relative;
    }
    .key-cell:hover::after {
      content: 'Kopiraj'; position: absolute; top: -20px; left: 0;
      background: #333; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem;
    }
    .badge-active { color: #4ade80; }
    .badge-inactive { color: #f87171; }
    .balance { color: #fbbf24; font-weight: 600; }
    .name-cell { font-weight: 600; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: #1e1e2e;
      border: 1px solid rgba(167,139,250,0.4); color: #fff;
      padding: 12px 20px; border-radius: 10px; font-size: 0.85rem;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    .new-student-result {
      margin-top: 14px; padding: 16px; border-radius: 10px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      display: none;
    }
    .new-student-result code { color: #4ade80; font-family: 'SF Mono', monospace; font-size: 0.9rem; }
    .new-student-result .label { color: rgba(255,255,255,0.5); font-size: 0.8rem; }

    #content { display: none; }
    .empty { color: rgba(255,255,255,0.3); text-align: center; padding: 32px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Upravljanje studentima</h1>
    <p class="subtitle">Dodaj, obriši i upravljaj studentskim pristupom.</p>

    <div class="nav">
      <a href="/admin">Krediti</a>
      <a href="/admin/info">Info Panel</a>
      <a href="/admin/students-panel">Studenti</a>
      <a href="/dashboard">Dashboard</a>
    </div>

    <div class="card" id="login-card">
      <h2>Admin pristup</h2>
      <div class="login-form">
        <input type="password" id="admin-secret" placeholder="Admin tajna..." />
        <button class="btn btn-primary" onclick="login()">Pristupi</button>
      </div>
    </div>

    <div id="content">
      <div class="card">
        <h2>Dodaj novog studenta</h2>
        <div class="add-form">
          <input name="name" id="new-name" placeholder="Ime i prezime" />
          <input name="balance" id="new-balance" type="number" placeholder="USD" value="10" min="0" step="1" />
          <button class="btn btn-primary" onclick="addNewStudent()">Dodaj studenta</button>
        </div>
        <div class="new-student-result" id="new-result">
          <div class="label">Ime:</div>
          <div id="result-name" style="font-weight:600; margin-bottom:8px;"></div>
          <div class="label">API ključ (pošalji studentu):</div>
          <code id="result-key"></code>
          <button class="btn btn-sm btn-success" style="margin-left:10px;" onclick="copyKey()">Kopiraj ključ</button>
          <div class="label" style="margin-top:8px;">Početni balans:</div>
          <div id="result-balance" class="balance"></div>
        </div>
      </div>

      <div class="card">
        <h2>Svi studenti</h2>
        <table>
          <thead>
            <tr><th>Ime</th><th>API ključ</th><th>Balans</th><th>Status</th><th>Kreiran</th><th>Akcije</th></tr>
          </thead>
          <tbody id="students-body"></tbody>
        </table>
        <div class="empty" id="no-students" style="display:none;">Nema studenata. Dodaj prvog iznad.</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let secret = '';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': secret } };
      if (body) opts.body = JSON.stringify(body);
      return fetch(path, opts).then(r => r.json());
    }

    function login() {
      secret = document.getElementById('admin-secret').value.trim();
      if (!secret) return;
      api('GET', '/admin/students?secret=' + encodeURIComponent(secret)).then(data => {
        if (data.error) { showToast('Pogrešna tajna!'); return; }
        document.getElementById('login-card').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        renderStudents(data);
      });
    }

    document.getElementById('admin-secret').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    function renderStudents(students) {
      const tbody = document.getElementById('students-body');
      const noStudents = document.getElementById('no-students');
      tbody.innerHTML = '';
      if (!students.length) { noStudents.style.display = 'block'; return; }
      noStudents.style.display = 'none';

      students.forEach(s => {
        const tr = document.createElement('tr');
        const date = new Date(s.created).toLocaleDateString('sr-Latn');
        tr.innerHTML = `
          <td class="name-cell">${esc(s.name)}</td>
          <td class="key-cell" onclick="copyText('${esc(s.key)}')" title="Klikni za kopiranje">${esc(s.key)}</td>
          <td class="balance">$${(s.balance_usd || 0).toFixed(2)}</td>
          <td class="${s.active ? 'badge-active' : 'badge-inactive'}">${s.active ? 'Aktivan' : 'Neaktivan'}</td>
          <td style="color:rgba(255,255,255,0.4)">${date}</td>
          <td class="actions">
            <button class="btn btn-sm ${s.active ? 'btn-warn' : 'btn-success'}" onclick="toggleActive('${esc(s.key)}', ${!s.active})">${s.active ? 'Deaktiviraj' : 'Aktiviraj'}</button>
            <button class="btn btn-sm btn-danger" onclick="deleteStudent('${esc(s.key)}', '${esc(s.name)}')">Obriši</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function esc(str) { return String(str).replace(/'/g, "\\'").replace(/</g, '&lt;'); }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast('Kopirano!'));
    }

    let lastKey = '';
    function copyKey() { copyText(lastKey); }

    function addNewStudent() {
      const name = document.getElementById('new-name').value.trim();
      const balance = parseFloat(document.getElementById('new-balance').value) || 0;
      if (!name) { showToast('Unesi ime studenta.'); return; }

      api('POST', '/admin/students', { name, initial_balance: balance }).then(data => {
        if (data.error) { showToast(data.error); return; }
        lastKey = data.key;
        document.getElementById('result-name').textContent = data.name;
        document.getElementById('result-key').textContent = data.key;
        document.getElementById('result-balance').textContent = '$' + (data.balance_usd || 0).toFixed(2);
        document.getElementById('new-result').style.display = 'block';
        document.getElementById('new-name').value = '';
        showToast('Student dodat!');
        refreshList();
      });
    }

    document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') addNewStudent(); });

    function toggleActive(key, active) {
      api('PATCH', '/admin/students/' + encodeURIComponent(key), { active }).then(data => {
        if (data.error) { showToast(data.error); return; }
        showToast(active ? 'Aktiviran' : 'Deaktiviran');
        refreshList();
      });
    }

    function deleteStudent(key, name) {
      if (!confirm(`Obrisati studenta "${name}"? Ovo se ne može poništiti.`)) return;
      api('DELETE', '/admin/students/' + encodeURIComponent(key)).then(data => {
        if (data.error) { showToast(data.error); return; }
        showToast('Student obrisan');
        refreshList();
      });
    }

    function refreshList() {
      api('GET', '/admin/students?secret=' + encodeURIComponent(secret)).then(data => {
        if (!data.error) renderStudents(data);
      });
    }
  </script>
</body>
</html>
