<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VajbAgent – Dopuni kredite (admin)</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 24px; }
    .box { max-width: 420px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h1 { margin: 0 0 8px; font-size: 18px; }
    p.sub { color: #666; font-size: 13px; margin: 0 0 20px; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 14px; }
    button { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
    button:hover { background: #333; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 13px; }
    .msg.ok { background: #e8f5e9; color: #1b5e20; }
    .msg.err { background: #ffebee; color: #c62828; }
    a { color: #1976d2; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Dopuni kredite</h1>
    <p class="sub">Unesi admin tajnu, key_id (poslednjih 8 znakova ključa) i iznos u USD.</p>
    <form id="f">
      <label>Admin tajna</label>
      <input type="password" name="admin_secret" placeholder="ADMIN_SECRET" required>
      <label>key_id (npr. nt-key-1 za student-key-1)</label>
      <input type="text" name="key_id" placeholder="nt-key-1" required>
      <label>Iznos (USD)</label>
      <input type="number" name="amount_usd" min="0.01" step="0.01" value="5" required>
      <button type="submit">Dodaj kredite</button>
    </form>
    <div id="msg"></div>
    <p style="margin-top: 16px;"><a href="/dashboard">← Dashboard</a></p>
  </div>
  <script>
    const form = document.getElementById('f');
    const msg = document.getElementById('msg');
    form.onsubmit = async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';
      const body = {
        admin_secret: form.admin_secret.value,
        key_id: form.key_id.value.trim(),
        amount_usd: parseFloat(form.amount_usd.value),
      };
      try {
        const r = await fetch('/admin/add-credits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok) {
          msg.className = 'msg ok';
          msg.textContent = 'Dodato ' + data.added_usd + ' USD za ' + data.key_id + '. Novo stanje: ' + data.balance_usd + ' USD.';
        } else {
          msg.className = 'msg err';
          msg.textContent = data.error || 'Greška ' + r.status;
        }
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = err.message || 'Mrežna greška';
      }
    };
  </script>
</body>
</html>
