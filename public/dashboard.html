<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VajbAgent – Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 14px;
      color: #0a0a0a;
      background: #f5f5f5;
      line-height: 1.5;
      min-height: 100vh;
    }
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0 32px;
      border-bottom: 1px solid #e0e0e0;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0a0a0a;
    }
    .key-badge {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: #666;
      letter-spacing: 0.02em;
    }
    .btn {
      padding: 8px 16px;
      border: 1px solid #333;
      background: transparent;
      color: #333;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #eee; }

    .hero {
      margin: 40px 0 36px;
      padding: 32px 28px;
      background: #0a0a0a;
      color: #fff;
    }
    .hero-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999;
      margin-bottom: 6px;
    }
    .hero-value {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: -0.02em;
    }
    .hero-value span { font-weight: 600; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    .tile {
      background: #fff;
      border: 1px solid #e5e5e5;
      padding: 20px 22px;
    }
    .tile-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
    }
    .tile-value {
      font-size: 22px;
      font-weight: 600;
      color: #0a0a0a;
    }
    .tile-bar {
      margin-top: 12px;
      height: 4px;
      background: #eee;
      overflow: hidden;
    }
    .tile-bar-fill {
      height: 100%;
      background: #333;
      transition: width 0.4s ease;
    }

    .section {
      background: #fff;
      border: 1px solid #e5e5e5;
      margin-bottom: 24px;
      padding: 24px 28px;
    }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 20px;
    }
    .chart-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .chart-row:last-child { margin-bottom: 0; }
    .chart-label {
      width: 80px;
      font-size: 12px;
      color: #555;
    }
    .chart-bar-wrap {
      flex: 1;
      height: 24px;
      background: #f0f0f0;
      display: flex;
      overflow: hidden;
    }
    .chart-bar-in {
      background: #1a1a1a;
      transition: width 0.5s ease;
    }
    .chart-bar-out {
      background: #4a4a4a;
      transition: width 0.5s ease;
    }
    .chart-num {
      width: 72px;
      text-align: right;
      font-size: 12px;
      font-weight: 600;
      color: #0a0a0a;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-top: 1px solid #eee;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
    .meta-row strong { color: #0a0a0a; }

    .login-wrap {
      max-width: 400px;
      margin: 80px auto 0;
      padding: 40px 32px;
      background: #fff;
      border: 1px solid #e5e5e5;
    }
    .login-wrap h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      margin: 0 0 20px;
    }
    .login-wrap input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .login-wrap input:focus {
      outline: none;
      border-color: #333;
    }
    .login-wrap .btn {
      width: 100%;
      padding: 12px;
      background: #0a0a0a;
      color: #fff;
      border-color: #0a0a0a;
    }
    .login-wrap .btn:hover { background: #333; border-color: #333; }
    .login-error {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      border-left: 2px solid #999;
      padding-left: 10px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div id="login" class="login-wrap">
      <h2>Prijava</h2>
      <input type="password" id="apikey" placeholder="API ključ" autocomplete="off">
      <button type="button" class="btn" id="btnLogin">Prikaži potrošnju</button>
      <p id="loginError" class="login-error hidden"></p>
    </div>

    <div id="dashboard" class="hidden">
      <div class="top">
        <div>
          <div class="logo">VajbAgent</div>
          <div class="key-badge">Ključ …<span id="keySuffix"></span></div>
        </div>
        <button type="button" class="btn" id="btnLogout">Odjavi se</button>
      </div>

      <div class="hero">
        <div class="hero-label">Raspoloživi kredit</div>
        <div class="hero-value"><span id="balanceVal">0.00</span> USD</div>
        <div style="margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap;">
          <button type="button" class="btn btn-dopuni" data-amount="5" style="background: #333; color: #fff; border-color: #333;">Dopuni 5 USD</button>
          <button type="button" class="btn btn-dopuni" data-amount="12" style="background: #333; color: #fff; border-color: #333;">Dopuni 12 USD</button>
          <button type="button" class="btn btn-dopuni" data-amount="22" style="background: #333; color: #fff; border-color: #333;">Dopuni 22 USD</button>
        </div>
        <p id="dopuniError" class="hidden" style="margin-top: 10px; font-size: 12px; color: #ccc;"></p>
      </div>

      <div class="grid">
        <div class="tile">
          <div class="tile-label">Ulazni tokeni</div>
          <div class="tile-value" id="valInput">0</div>
          <div class="tile-bar">
            <div class="tile-bar-fill" id="barInput" style="width: 0%"></div>
          </div>
        </div>
        <div class="tile">
          <div class="tile-label">Izlazni tokeni</div>
          <div class="tile-value" id="valOutput">0</div>
          <div class="tile-bar">
            <div class="tile-bar-fill" id="barOutput" style="width: 0%"></div>
          </div>
        </div>
        <div class="tile">
          <div class="tile-label">Zahtevi</div>
          <div class="tile-value" id="valRequests">0</div>
          <div class="tile-bar">
            <div class="tile-bar-fill" id="barRequests" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Tokeni (ulaz vs izlaz)</div>
        <div class="chart-row">
          <span class="chart-label">Ukupno</span>
          <div class="chart-bar-wrap">
            <div class="chart-bar-in" id="stackIn" style="width: 0%"></div>
            <div class="chart-bar-out" id="stackOut" style="width: 0%"></div>
          </div>
          <span class="chart-num" id="chartTotalNum">0</span>
        </div>
        <div class="meta-row" style="border-top: none; margin-top: 8px;">
          <span>Ulaz <strong id="chartInNum">0</strong></span>
          <span>Izlaz <strong id="chartOutNum">0</strong></span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Detalji</div>
        <div class="meta-row">
          <span>Poslednja upotreba</span>
          <strong id="valLast">—</strong>
        </div>
        <div class="meta-row">
          <span>Procenjeni trošak (potrošeno)</span>
          <strong id="valCost">0.00 USD</strong>
        </div>
      </div>
    </div>
  </div>
  <script>
    var STORAGE_KEY = 'vajb_apikey';
    var loginEl = document.getElementById('login');
    var dashboardEl = document.getElementById('dashboard');
    var apikeyInput = document.getElementById('apikey');
    var loginError = document.getElementById('loginError');
    var btnLogin = document.getElementById('btnLogin');
    var btnLogout = document.getElementById('btnLogout');

    function showError(msg) {
      loginError.textContent = msg;
      loginError.classList.remove('hidden');
    }
    function hideError() {
      loginError.classList.add('hidden');
    }
    function getBaseUrl() { return window.location.origin; }

    function loadFromStorage() {
      var key = localStorage.getItem(STORAGE_KEY);
      if (key) {
        apikeyInput.value = key;
        fetchMe(key);
      }
    }

    function fetchMe(apiKey) {
      fetch(getBaseUrl() + '/me', { headers: { 'Authorization': 'Bearer ' + apiKey } })
        .then(function (r) {
          if (!r.ok) {
            if (r.status === 401 || r.status === 403) throw new Error('Neispravan API ključ.');
            throw new Error('Greška pri učitavanju.');
          }
          return r.json();
        })
        .then(function (data) {
          hideError();
          localStorage.setItem(STORAGE_KEY, apiKey);
          loginEl.classList.add('hidden');
          dashboardEl.classList.remove('hidden');
          render(data);
        })
        .catch(function (err) { showError(err.message || 'Greška.'); });
    }

    function formatNum(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
      return String(n);
    }
    function formatDate(iso) {
      try {
        var d = new Date(iso);
        return d.toLocaleDateString('sr-RS') + ' ' + d.toLocaleTimeString('sr-RS', { hour: '2-digit', minute: '2-digit' });
      } catch (e) { return iso; }
    }

    function render(data) {
      document.getElementById('keySuffix').textContent = data.key_id || '—';
      document.getElementById('balanceVal').textContent = (data.balance_usd != null ? data.balance_usd : 0).toFixed(2);
      document.getElementById('valInput').textContent = formatNum(data.input_tokens || 0);
      document.getElementById('valOutput').textContent = formatNum(data.output_tokens || 0);
      document.getElementById('valRequests').textContent = formatNum(data.requests || 0);
      document.getElementById('valLast').textContent = data.last_used ? formatDate(data.last_used) : '—';
      document.getElementById('valCost').textContent = (data.estimated_cost_usd != null ? data.estimated_cost_usd : 0).toFixed(2) + ' USD';

      var maxT = Math.max(data.input_tokens || 0, data.output_tokens || 0, 1);
      var pctIn = ((data.input_tokens || 0) / maxT) * 100;
      var pctOut = ((data.output_tokens || 0) / maxT) * 100;
      document.getElementById('barInput').style.width = Math.min(pctIn, 100) + '%';
      document.getElementById('barOutput').style.width = Math.min(pctOut, 100) + '%';

      var maxReq = 500;
      document.getElementById('barRequests').style.width = Math.min(((data.requests || 0) / maxReq) * 100, 100) + '%';

      var total = (data.input_tokens || 0) + (data.output_tokens || 0);
      var pctInStack = total ? ((data.input_tokens || 0) / total) * 100 : 50;
      var pctOutStack = total ? ((data.output_tokens || 0) / total) * 100 : 50;
      document.getElementById('stackIn').style.width = pctInStack + '%';
      document.getElementById('stackOut').style.width = pctOutStack + '%';
      document.getElementById('chartTotalNum').textContent = formatNum(total);
      document.getElementById('chartInNum').textContent = formatNum(data.input_tokens || 0);
      document.getElementById('chartOutNum').textContent = formatNum(data.output_tokens || 0);
    }

    btnLogin.addEventListener('click', function () {
      var key = (apikeyInput.value || '').trim();
      if (!key) { showError('Unesi API ključ.'); return; }
      fetchMe(key);
    });
    btnLogout.addEventListener('click', function () {
      localStorage.removeItem(STORAGE_KEY);
      apikeyInput.value = '';
      dashboardEl.classList.add('hidden');
      loginEl.classList.remove('hidden');
      hideError();
    });

    document.querySelectorAll('.btn-dopuni').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var amount = Number(this.getAttribute('data-amount'));
        var key = localStorage.getItem(STORAGE_KEY);
        if (!key) return;
        var errEl = document.getElementById('dopuniError');
        errEl.classList.add('hidden');
        fetch(getBaseUrl() + '/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
          body: JSON.stringify({ amount_usd: amount })
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.url) window.location.href = data.url;
            else { errEl.textContent = data.error || 'Greška'; errEl.classList.remove('hidden'); }
          })
          .catch(function () { errEl.textContent = 'Greška pri povezivanju.'; errEl.classList.remove('hidden'); });
      });
    });
    loadFromStorage();
  </script>
</body>
</html>
