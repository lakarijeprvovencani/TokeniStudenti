<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VajbAgent Full API Test</title>
<style>
body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; font-size: 13px; }
pre { white-space: pre-wrap; background: #111; padding: 8px; border-radius: 4px; margin: 2px 0; }
button { background: #fa7315; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; margin: 5px; }
button:disabled { opacity: 0.5; }
.ok { color: #0f0; } .err { color: #f44; } .warn { color: #ff0; } .info { color: #6cf; }
#output { max-height: 80vh; overflow-y: auto; }
</style>
</head>
<body>
<h1>VajbAgent Full Agent Loop Test</h1>
<p>Simulira kompletan agent loop kao web extension: pun system prompt, svih 21 tools, max_tokens: 16000, multi-iteration.</p>
<button onclick="runTest()">▶ Pokreni Test</button>
<button onclick="doAbort()" id="btnAbort" disabled>■ Zaustavi</button>
<div id="output"></div>

<script>
const API = 'https://vajbagent.com';
let ctrl = null;
const doAbort = () => { if (ctrl) ctrl.abort(); };

// Puni system prompt (skraćen za test ali sa ključnim delovima)
const SYSTEM = `You are VajbAgent, an AI coding assistant running in a browser-based IDE.
You help users build websites by writing code directly using tools.

CRITICAL RULES:
- Write COMPLETE files in one go. Plan ALL class names BEFORE writing.
- Write each file ONCE then move on. Use replace_in_file for changes.
- For static sites: create index.html + style.css + script.js
- ALWAYS include <meta charset="UTF-8"> in HTML
- Use semantic HTML, CSS variables, flexbox/grid
- Mobile-first responsive design
- ONE CSS file only, never split
- Finish in minimal tool calls. Write and move on.
- ALWAYS end with a text summary message.
- search_images for stock photos, use URLs directly in HTML.
- Do NOT read files back after writing. Do NOT verify with commands.`;

const PROMPT = `Sajt za stomatološku ordinaciju PRODENT — jasno, profesionalno i fokusirano na konverziju: cilj je brzo zakazivanje pregleda, predstavljanje usluga i izgradnja poverenja. Struktura: hero sekcija sa jasnim CTA "Zakaži pregled" i telefonom, servisna galerija (kartice sa ikonama za stomatologiju opšte prakse, protetiku, implantologiju, estetsku stomatologiju, endodonciju), cenovnik/meni usluga kao pregledne kartice, detaljne stranice za svaku proceduru. Posebne sekcije: tim lekara sa biografijama i sertifikatima, pre/posle galerija sa sliderom, testimonijali u karuselu, FAQ akordion, radno vreme i hitni kontakt, info o prihvatu osiguranja i metodama plaćanja. Kontakt stranica sa formularom i ugrađenom mapom lokacije. Dizajn: svetla, čista paleta sa plavim akcentima koji ulivaju poverenje; tipografija: moderan sans-serif, veliki naslovi i prozračni razmaci; potpuno responsivan, moderan izgled sa suptilnim animacijama pri skrolovanju i mikrointerakcijama za CTA dugmad.`;

// All 21 tools (same as web extension)
const TOOLS = [
  { type: "function", function: { name: "write_file", description: "Kreiraj ili prepisi fajl. Sadrzaj mora biti kompletan.", parameters: { type: "object", properties: { path: { type: "string", description: "Putanja do fajla" }, content: { type: "string", description: "Kompletan sadrzaj fajla" } }, required: ["path", "content"] } } },
  { type: "function", function: { name: "read_file", description: "Procitaj sadrzaj fajla.", parameters: { type: "object", properties: { path: { type: "string", description: "Putanja do fajla" } }, required: ["path"] } } },
  { type: "function", function: { name: "list_files", description: "Prikazi listu fajlova u folderu.", parameters: { type: "object", properties: { path: { type: "string", description: "Putanja do foldera" } }, required: ["path"] } } },
  { type: "function", function: { name: "replace_in_file", description: "Zameni deo teksta u fajlu.", parameters: { type: "object", properties: { path: { type: "string", description: "Putanja do fajla" }, old_text: { type: "string" }, new_text: { type: "string" } }, required: ["path", "old_text", "new_text"] } } },
  { type: "function", function: { name: "execute_command", description: "Izvrsi komandu u terminalu.", parameters: { type: "object", properties: { command: { type: "string" } }, required: ["command"] } } },
  { type: "function", function: { name: "search_files", description: "Search for regex pattern across files.", parameters: { type: "object", properties: { path: { type: "string" }, pattern: { type: "string" }, file_glob: { type: "string" } }, required: ["path", "pattern"] } } },
  { type: "function", function: { name: "fetch_url", description: "Fetch content from URL.", parameters: { type: "object", properties: { url: { type: "string" }, method: { type: "string" }, headers: { type: "object" }, body: { type: "string" } }, required: ["url"] } } },
  { type: "function", function: { name: "web_search", description: "Search the internet.", parameters: { type: "object", properties: { query: { type: "string" }, max_results: { type: "integer" } }, required: ["query"] } } },
  { type: "function", function: { name: "search_images", description: "Search Unsplash for images.", parameters: { type: "object", properties: { query: { type: "string" }, count: { type: "integer" }, orientation: { type: "string" } }, required: ["query"] } } },
  { type: "function", function: { name: "download_file", description: "Download file from URL.", parameters: { type: "object", properties: { url: { type: "string" }, path: { type: "string" } }, required: ["url", "path"] } } },
  { type: "function", function: { name: "supabase_list_tables", description: "List tables.", parameters: { type: "object", properties: {} } } },
  { type: "function", function: { name: "supabase_describe_table", description: "Describe table.", parameters: { type: "object", properties: { table: { type: "string" } }, required: ["table"] } } },
  { type: "function", function: { name: "supabase_sql", description: "Execute SQL.", parameters: { type: "object", properties: { query: { type: "string" } }, required: ["query"] } } },
  { type: "function", function: { name: "supabase_get_auth_config", description: "Get auth config.", parameters: { type: "object", properties: {} } } },
  { type: "function", function: { name: "supabase_update_auth_config", description: "Update auth config.", parameters: { type: "object", properties: { config: { type: "object" } }, required: ["config"] } } },
  { type: "function", function: { name: "supabase_list_functions", description: "List edge functions.", parameters: { type: "object", properties: {} } } },
  { type: "function", function: { name: "supabase_deploy_function", description: "Deploy edge function.", parameters: { type: "object", properties: { slug: { type: "string" }, body: { type: "string" }, name: { type: "string" }, verify_jwt: { type: "boolean" } }, required: ["slug", "body"] } } },
  { type: "function", function: { name: "supabase_delete_function", description: "Delete edge function.", parameters: { type: "object", properties: { slug: { type: "string" } }, required: ["slug"] } } },
  { type: "function", function: { name: "git_status", description: "Check GitHub status.", parameters: { type: "object", properties: {} } } },
  { type: "function", function: { name: "git_list_repos", description: "List repos.", parameters: { type: "object", properties: {} } } },
  { type: "function", function: { name: "git_push", description: "Push to GitHub.", parameters: { type: "object", properties: { repo: { type: "string" }, message: { type: "string" }, create_if_missing: { type: "boolean" } }, required: ["repo", "message"] } } },
];

function log(text, cls = '') {
  const el = document.getElementById('output');
  const div = document.createElement('pre');
  div.className = cls;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function callAPI(messages) {
  const start = Date.now();
  const res = await fetch(API + '/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ model: 'vajb-agent-max', messages, tools: TOOLS, stream: true, max_tokens: 16000 }),
    signal: ctrl.signal,
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '', fullText = '', toolCalls = {}, finishReason = null, chunkCount = 0;
  let firstChunk = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    if (!firstChunk) firstChunk = Date.now();

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      const t = line.trim();
      if (!t.startsWith('data: ') || t === 'data: [DONE]') continue;
      try {
        const p = JSON.parse(t.slice(6));
        const c = p.choices?.[0];
        if (!c) continue;
        chunkCount++;
        if (c.finish_reason) finishReason = c.finish_reason;
        if (c.delta?.content) fullText += c.delta.content;
        if (c.delta?.tool_calls) {
          for (const tc of c.delta.tool_calls) {
            const idx = tc.index ?? 0;
            if (!toolCalls[idx]) toolCalls[idx] = { id: '', name: '', args: '' };
            if (tc.id) toolCalls[idx].id = tc.id;
            if (tc.function?.name) toolCalls[idx].name = tc.function.name;
            if (tc.function?.arguments) toolCalls[idx].args += tc.function.arguments;
          }
        }
      } catch {}
    }
  }

  const elapsed = (Date.now() - start) / 1000;
  const ttfb = firstChunk ? (firstChunk - start) / 1000 : 0;
  return { text: fullText, toolCalls: Object.values(toolCalls), finishReason, elapsed, ttfb, chunkCount };
}

function fakeToolResult(tc) {
  const name = tc.name;
  let args = {};
  try { args = JSON.parse(tc.args); } catch {
    // Try regex recovery for truncated JSON
    const pm = tc.args.match(/"path"\s*:\s*"([^"]+)"/);
    if (pm) args.path = pm[1];
  }

  if (name === 'search_images') {
    const q = args.query || 'dental';
    return `Found 3 image(s) for "${q}":\n1. Professional dental clinic\n   URL: https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=800\n   Credit: Photo by Unsplash\n2. Dental equipment\n   URL: https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=800\n   Credit: Photo by Unsplash\n3. Smiling patient\n   URL: https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=800\n   Credit: Photo by Unsplash`;
  }
  if (name === 'write_file') {
    const p = args.path || '?';
    const content = args.content || '';
    if (!content || content.length < 50) return `GRESKA: ${p} sadrzaj je presecen.`;
    return `OK: Fajl upisan: ${p} (${content.length} chars)`;
  }
  if (name === 'list_files') return 'Prazan folder';
  if (name === 'read_file') return 'Greska: fajl ne postoji';
  if (name === 'replace_in_file') return `Fajl azuriran: ${args.path || '?'}`;
  if (name === 'execute_command') return `OK`;
  return `Tool ${name} executed`;
}

async function runTest() {
  document.getElementById('output').innerHTML = '';
  document.getElementById('btnAbort').disabled = false;
  ctrl = new AbortController();

  const totalStart = Date.now();
  const writtenFiles = {};

  // Session check
  log('═══ SESSION CHECK ═══', 'info');
  try {
    const me = await fetch(API + '/me', { credentials: 'include' });
    if (!me.ok) { log('✗ Nije ulogovan. Idi na vajbagent.netlify.app i uloguj se.', 'err'); return; }
    const d = await me.json();
    log(`✓ ${d.name || 'OK'} | Balans: $${d.balance_usd?.toFixed(2)}`, 'ok');
  } catch (e) { log('✗ ' + e.message, 'err'); return; }

  // Agent loop
  log('\n═══ AGENT LOOP START ═══', 'info');
  log(`Model: vajb-agent-max | max_tokens: 16000 | Tools: ${TOOLS.length}`, 'info');
  log(`Prompt: ${PROMPT.substring(0, 100)}...`, 'info');

  const history = [
    { role: 'system', content: SYSTEM },
    { role: 'user', content: PROMPT },
  ];

  const MAX_ITER = 15;

  for (let iter = 0; iter < MAX_ITER; iter++) {
    if (ctrl.signal.aborted) break;

    log(`\n── Iteracija ${iter + 1}/${MAX_ITER} ──`, 'info');
    log(`  History: ${history.length} poruka, ~${Math.round(JSON.stringify(history).length / 4000)}K tokena`);

    let result;
    try {
      result = await callAPI(history);
    } catch (e) {
      if (e.name === 'AbortError') { log('Zaustavljeno.', 'warn'); break; }
      log(`✗ API Error: ${e.message}`, 'err');
      break;
    }

    log(`  Vreme: ${result.elapsed.toFixed(1)}s (TTFB: ${result.ttfb.toFixed(1)}s) | Chunks: ${result.chunkCount} | Finish: ${result.finishReason}`);

    // Text response
    if (result.text) {
      log(`  Tekst: ${result.text.substring(0, 200)}${result.text.length > 200 ? '...' : ''}`, 'ok');
    }

    // No tool calls = done
    if (result.toolCalls.length === 0) {
      if (result.text) {
        log(`\n✓ Model završio sa tekstualnom porukom.`, 'ok');
      } else {
        log(`\n⚠ Prazan odgovor.`, 'warn');
      }
      break;
    }

    // Process tool calls
    const assistantMsg = { role: 'assistant', content: result.text || '', tool_calls: result.toolCalls.map((tc, i) => ({ id: tc.id || `tc_${i}`, type: 'function', function: { name: tc.name, arguments: tc.args } })) };
    history.push(assistantMsg);

    for (const tc of result.toolCalls) {
      let jsonOk = false;
      try { JSON.parse(tc.args); jsonOk = true; } catch {}

      const pm = tc.args.match(/"path"\s*:\s*"([^"]+)"/);
      const path = pm ? pm[1] : '';

      if (tc.name === 'write_file') {
        const cm = tc.args.match(/"content"\s*:\s*"/);
        const contentLen = cm ? tc.args.length - cm.index - 12 : 0;
        const status = jsonOk ? '✓ JSON OK' : '⚠ JSON truncated';
        const cls = jsonOk ? 'ok' : 'warn';
        log(`  → write_file("${path}") | ${contentLen} chars | ${status}`, cls);
        if (path) writtenFiles[path] = (writtenFiles[path] || 0) + 1;
      } else if (tc.name === 'search_images') {
        const qm = tc.args.match(/"query"\s*:\s*"([^"]+)"/);
        log(`  → search_images("${qm ? qm[1] : '?'}")`, 'ok');
      } else if (tc.name === 'replace_in_file') {
        log(`  → replace_in_file("${path}")`, 'ok');
      } else {
        log(`  → ${tc.name}(${tc.args.substring(0, 60)})`, 'ok');
      }

      // Fake tool result
      const toolResult = fakeToolResult(tc);
      history.push({ role: 'tool', content: toolResult, tool_call_id: tc.id || `tc_${result.toolCalls.indexOf(tc)}` });
    }
  }

  // Summary
  const totalTime = ((Date.now() - totalStart) / 1000).toFixed(1);
  log(`\n═══ SUMMARY ═══`, 'info');
  log(`Ukupno vreme: ${totalTime}s`, totalTime < 180 ? 'ok' : 'err');
  log(`Fajlovi napisani:`, 'info');
  for (const [path, count] of Object.entries(writtenFiles)) {
    const cls = count > 1 ? 'warn' : 'ok';
    log(`  ${path}: ${count}x write_file`, cls);
  }
  if (Object.keys(writtenFiles).length === 0) {
    log('  ✗ Nijedan fajl nije napisan!', 'err');
  }

  document.getElementById('btnAbort').disabled = true;
}
</script>
</body>
</html>
